{% extends 'base.html' %}
{% block content %}
<div class="auth-card">
    <h1>Recuperar Contraseña</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="button primary">Enviar enlace</button>
    </form>
    <div class="auth-link">
        <a href="/">Volver a login</a>
    </div>
</div>
{% endblock %}
