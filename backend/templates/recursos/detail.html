{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h1>{{ recurso.nombre }}</h1>
    <p>{{ recurso.tipo }} · {{ recurso.estado }}</p>
</div>
<section class="card detail-card">
    <div class="detail-grid">
        <div class="detail-image" style="background-image: url('{{ recurso.imagen|default:'/static/img/placeholder.png' }}')"></div>
        <div>
            <h2>Descripción</h2>
            <p>{{ recurso.descripcion }}</p>
            <p><strong>Estado:</strong> {{ recurso.estado }}</p>
            <p><strong>Tipo:</strong> {{ recurso.tipo }}</p>
            <div class="actions">
                <a class="button secondary" href="/recursos/{{ recurso.id }}/editar/">Editar</a>
                <form method="post" action="/recursos/{{ recurso.id }}/eliminar/" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="button danger">Eliminar</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
